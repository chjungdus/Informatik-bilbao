<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelRush – Jump &amp; Run</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== STARTMENÜ ===== -->
  <div id="screen-menu" class="screen screen--active">
    <div class="menu-box">
      <h1 class="menu-title">
        <span class="menu-title__pixel">PIXEL</span
        ><span class="menu-title__rush">RUSH</span>
      </h1>
      <p class="menu-subtitle">Jump &amp; Run</p>
      <div class="menu-highscore">
        🏆 Highscore: <span id="menu-highscore-val">0</span>
      </div>
      <button id="btn-start" class="menu-btn menu-btn--primary">▶ Spielen</button>
      <button id="btn-how"   class="menu-btn">❓ Steuerung</button>
    </div>
    <!-- Animierte Hintergrund-Sterne -->
    <canvas id="star-canvas"></canvas>
  </div>

  <!-- ===== STEUERUNGS-OVERLAY ===== -->
  <div id="screen-how" class="screen overlay-screen" hidden>
    <div class="overlay-box">
      <h2>Steuerung</h2>
      <ul class="how-list">
        <li><kbd>←</kbd> <kbd>→</kbd> &nbsp; Bewegen</li>
        <li><kbd>↑</kbd> / <kbd>W</kbd> / <kbd>Space</kbd> &nbsp; Springen</li>
        <li><kbd>P</kbd> &nbsp; Pause</li>
        <li><kbd>R</kbd> &nbsp; Neustart (nach Game Over)</li>
      </ul>
      <p class="how-tips">
        💰 Sammle Münzen &nbsp;|&nbsp;
        ❤️ 3 Leben &nbsp;|&nbsp;
        ⭐ Besondere Power-Ups
      </p>
      <button id="btn-how-close" class="menu-btn menu-btn--primary">Zurück</button>
    </div>
  </div>

  <!-- ===== SPIEL-HUD ===== -->
  <div id="hud" class="hud" hidden>
    <div class="hud__left">
      <span id="hud-lives"  class="hud__item">❤️ <span id="hud-lives-val">3</span></span>
      <span id="hud-level"  class="hud__item">🗺 Level <span id="hud-level-val">1</span></span>
    </div>
    <div class="hud__center">
      <span id="hud-score"  class="hud__item">⭐ <span id="hud-score-val">0</span></span>
    </div>
    <div class="hud__right">
      <span id="hud-coins"  class="hud__item">🪙 <span id="hud-coins-val">0</span></span>
      <button id="btn-pause" class="hud__btn">⏸</button>
    </div>
  </div>

  <!-- ===== GAME CANVAS ===== -->
  <canvas id="game-canvas" hidden></canvas>

  <!-- ===== PAUSE-OVERLAY ===== -->
  <div id="screen-pause" class="screen overlay-screen" hidden>
    <div class="overlay-box">
      <h2>Pause</h2>
      <button id="btn-resume"  class="menu-btn menu-btn--primary">▶ Weiter</button>
      <button id="btn-restart" class="menu-btn">↺ Neustart</button>
      <button id="btn-to-menu" class="menu-btn">🏠 Menü</button>
    </div>
  </div>

  <!-- ===== LEVEL-CLEAR-OVERLAY ===== -->
  <div id="screen-levelclear" class="screen overlay-screen" hidden>
    <div class="overlay-box">
      <h2>🎉 Level geschafft!</h2>
      <p id="lc-score-line" class="overlay-info"></p>
      <p id="lc-coins-line" class="overlay-info"></p>
      <button id="btn-next-level" class="menu-btn menu-btn--primary">Weiter ▶</button>
    </div>
  </div>

  <!-- ===== GAME-OVER-OVERLAY ===== -->
  <div id="screen-gameover" class="screen overlay-screen" hidden>
    <div class="overlay-box overlay-box--danger">
      <h2>💀 Game Over</h2>
      <p id="go-score-line"  class="overlay-info"></p>
      <p id="go-high-line"   class="overlay-info"></p>
      <button id="btn-go-restart" class="menu-btn menu-btn--primary">↺ Nochmal</button>
      <button id="btn-go-menu"    class="menu-btn">🏠 Menü</button>
    </div>
  </div>

  <!-- ===== WIN-OVERLAY ===== -->
  <div id="screen-win" class="screen overlay-screen" hidden>
    <div class="overlay-box overlay-box--gold">
      <h2>🏆 Du hast gewonnen!</h2>
      <p id="win-score-line" class="overlay-info"></p>
      <p id="win-high-line"  class="overlay-info"></p>
      <button id="btn-win-menu" class="menu-btn menu-btn--primary">🏠 Menü</button>
    </div>
  </div>

  <!-- Mobile Touch-Controls -->
  <div id="touch-controls" class="touch-controls" hidden>
    <button id="tc-left"  class="tc-btn">◀</button>
    <button id="tc-jump"  class="tc-btn tc-btn--jump">▲</button>
    <button id="tc-right" class="tc-btn">▶</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
